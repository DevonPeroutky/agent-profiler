name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Full test suite
        run: npm test

      - name: Verify pack contents
        if: matrix.node == 20
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          # Confirm we ship only the allowlisted paths and never source/tests.
          if grep -E '(^|/)(test|src|node_modules)/' /tmp/pack.txt; then
            echo "::error::npm pack would include source/test files"
            exit 1
          fi

      # Pack the tarball, install it globally, and smoke-test the installed
      # binary. Catches missing entries in `files` that the local smoke test
      # can't see (the local test runs against the working tree).
      - name: Pack-and-install smoke test
        if: matrix.node == 20
        run: |
          npm pack
          npm install -g ./agent-profiler-*.tgz
          agent-profiler --version
          agent-profiler --port 0 --no-open > /tmp/cli.log 2>&1 &
          PID=$!
          for i in 1 2 3 4 5; do
            sleep 1
            PORT=$(grep -oE 'localhost:[0-9]+' /tmp/cli.log | head -1 | cut -d: -f2)
            [ -n "$PORT" ] && break
          done
          [ -n "$PORT" ] || (cat /tmp/cli.log; kill $PID; exit 1)
          curl -fsS "http://localhost:$PORT/api/health" || (kill $PID; exit 1)
          kill $PID
