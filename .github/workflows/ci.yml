name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # Pre-existing typecheck errors in test/attachments.test.js — surfaced
      # but non-blocking until the test types are caught up. Remove
      # continue-on-error once test/attachments.test.js is fixed.
      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Smoke test (validates the published binary)
        run: node --test test/bin.smoke.test.js

      # Pre-existing failures in test/attachments.test.js — surfaced but
      # non-blocking. Remove continue-on-error once those are fixed.
      - name: Full test suite
        run: npm test
        continue-on-error: true

      - name: Verify pack contents
        if: matrix.node == 20
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          # Confirm we ship only the allowlisted paths and never source/tests.
          if grep -E '(^|/)(test|src|node_modules)/' /tmp/pack.txt; then
            echo "::error::npm pack would include source/test files"
            exit 1
          fi
