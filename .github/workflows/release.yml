name: Release

on:
  push:
    branches: [main]

# release-please needs to open PRs and create tags. The publish job needs
# id-token: write for npm provenance attestations + npm OIDC trusted publishing.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Update release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test before publish
        run: node --test test/bin.smoke.test.js

      # Trusted Publishers: configure on npmjs.com → package settings.
      # Provenance requires id-token: write (set above).
      - name: Publish
        run: npm publish --provenance --access public
        env:
          # NPM_TOKEN is only used as a fallback if Trusted Publishers
          # is not yet configured. Once Trusted Publishers is set up on
          # npmjs.com you can delete this secret entirely.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
