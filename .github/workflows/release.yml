name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# release-please needs to open PRs and create tags. The publish job needs
# id-token: write for npm provenance attestations + npm OIDC trusted publishing.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Update release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted Publisher OIDC token exchange requires npm >= 11.5.1.
      # Node 20 ships npm 10.x, so upgrade explicitly.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test before publish
        run: node --test test/bin.smoke.test.js

      # Auth happens via Trusted Publishers (OIDC). No NPM_TOKEN needed.
      - name: Publish
        run: npm publish --provenance --access public
