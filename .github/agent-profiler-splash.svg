<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">agent-profiler app overview</title>
  <desc id="desc">A stylized overview of the agent-profiler trace waterfall interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f7f9"/>
      <stop offset="1" stop-color="#e8edf2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#111827" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect x="94" y="64" width="1212" height="692" rx="18" fill="#ffffff" filter="url(#shadow)"/>
